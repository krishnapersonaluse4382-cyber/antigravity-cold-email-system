name: Send Cold Emails

# ── HOW THIS WORKS (TEST RUN) ──────────────────────────────────────────────────
# This is currently configured ONLY for a 3-email test run.
#
# Each manual trigger:
#   1. Sends 1 initial email from Krishna
#   2. Waits exactly 5 minutes
#   3. Sends 1 initial email from Ryan
#   4. Waits exactly 5 minutes
#   5. Sends 1 initial email from Rik
#
# Result: 1 run × 3 accounts = 3 emails per run
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Execute scheduled campaign (Jordan Beta 9)
        env:
          KRISHNA_PASS:     ${{ secrets.KRISHNA_PASS }}
          RYAN_PASS:        ${{ secrets.RYAN_PASS }}
          RIK_PASS:         ${{ secrets.RIK_PASS }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node schedule_executor.js

      - name: Commit updated queue and leads back to repo
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions"
          git add campaign_queue.json leads_tracked.csv email_state.json
          git commit -m "chore: save campaign progress [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main

