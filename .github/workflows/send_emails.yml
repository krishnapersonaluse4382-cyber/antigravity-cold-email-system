name: Send Cold Emails

# ── HOW THIS WORKS (TEST RUN) ──────────────────────────────────────────────────
# This is currently configured ONLY for a 3-email test run.
#
# Each manual trigger:
#   1. Sends 1 initial email from Krishna
#   2. Waits exactly 5 minutes
#   3. Sends 1 initial email from Ryan
#   4. Waits exactly 5 minutes
#   5. Sends 1 initial email from Rik
#
# Result: 1 run × 3 accounts = 3 emails per run
# ─────────────────────────────────────────────────────────────────────────────

on:
  # Manual trigger — visible in GitHub → Actions tab → "Send Cold Emails" → "Run workflow"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Send emails (1 per account, staggered)
        env:
          KRISHNA_PASS:     ${{ secrets.KRISHNA_PASS }}
          RYAN_PASS:        ${{ secrets.RYAN_PASS }}
          RIK_PASS:         ${{ secrets.RIK_PASS }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node cloud_send.js

      - name: Commit updated email state and leads back to repo
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions"
          git pull --rebase origin main
          git add email_state.json leads_tracked.csv
          git diff --staged --quiet || git commit -m "chore: update email state and leads [skip ci]"
          git push
